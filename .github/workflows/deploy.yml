name: CI/CD Pipeline - DevOps Project

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Clonar repositorio
      uses: actions/checkout@v3

    - name: Build imagen Docker
      run: |
        docker build -t devops-web:latest ./app

    - name: Prueba basica
      run: |
        docker run -d --name test-container -p 8081:80 devops-web:latest
        sleep 5
        curl -f http://localhost:8081 || exit 1
        docker stop test-container
        docker rm test-container

    - name: Deploy en servidor
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.SERVER_IP }}
        username: ubuntu
        key: ${{ secrets.SSH_KEY }}
        script: |
          cd ~/devops-project
          git pull origin main
          sudo docker build -t devops-web:latest ./app
          sudo docker stack deploy -c docker-stack.yml devops-stack
