version: '3.8'

services:
  web:
    build: ./app
    ports:
      - "80:80"
    networks:
      - devops-network
    restart: always

  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: devops2024
      MYSQL_DATABASE: devopsdb
      MYSQL_USER: devopsuser
      MYSQL_PASSWORD: devops2024
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - devops-network
    restart: always

networks:
  devops-network:
    driver: bridge

volumes:
  mysql-data:
